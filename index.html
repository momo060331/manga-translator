<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f0f0f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="MangaTL" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>MangaTL — 漫画翻訳</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f0f0f;
      --surface: #1a1a1a;
      --surface2: #242424;
      --border: #2e2e2e;
      --accent: #7fff7f;
      --accent-dim: rgba(127,255,127,0.1);
      --accent-dark: #3a8a3a;
      --text: #efefef;
      --text-muted: #888;
      --text-dim: #4a4a4a;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 18px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; }

    /* ===== LAYOUT ===== */
    #app { display: flex; flex-direction: column; height: 100%; padding-top: var(--safe-top); }

    /* ===== HEADER ===== */
    .header {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 17px; font-weight: 500;
      color: var(--accent);
      letter-spacing: -0.3px;
      flex-shrink: 0;
    }
    .logo em { color: var(--text-muted); font-style: normal; }
    .header-spacer { flex: 1; }
    .icon-btn {
      width: 34px; height: 34px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-sm); color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 15px; flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }
    .icon-btn:active { border-color: var(--accent); color: var(--accent); }

    /* ===== URL BAR ===== */
    .url-bar {
      flex-shrink: 0;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .url-row { display: flex; gap: 8px; }
    .url-input {
      flex: 1; min-width: 0;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 9px 12px;
      font-size: 12px; font-family: 'DM Mono', monospace;
      color: var(--text); outline: none;
      transition: border-color 0.2s;
    }
    .url-input:focus { border-color: var(--accent); }
    .url-input::placeholder { color: var(--text-dim); }
    .go-btn {
      padding: 0 14px; height: 38px;
      background: var(--accent); color: #000;
      font-weight: 700; border: none;
      border-radius: var(--radius-sm); font-size: 13px;
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      font-family: 'Noto Sans JP', sans-serif;
      transition: opacity 0.15s;
    }
    .go-btn:active { opacity: 0.75; }
    .go-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* ===== NAV BAR ===== */
    .nav-bar {
      flex-shrink: 0; display: none;
      align-items: center; gap: 6px;
      padding: 8px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .nav-bar.visible { display: flex; }
    .nav-btn {
      height: 30px; padding: 0 12px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; color: var(--text-muted);
      font-size: 12px; cursor: pointer; white-space: nowrap;
      font-family: 'Noto Sans JP', sans-serif;
      transition: all 0.15s;
    }
    .nav-btn:active { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .page-label {
      flex: 1; text-align: center;
      font-size: 11px; color: var(--text-dim);
      font-family: 'DM Mono', monospace;
    }

    /* ===== STATUS ===== */
    .status-bar {
      flex-shrink: 0;
      display: flex; align-items: center; gap: 8px;
      padding: 5px 16px; min-height: 28px;
      background: var(--bg); border-bottom: 1px solid var(--border);
    }
    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-dim); flex-shrink: 0; }
    .dot.loading { background: var(--accent); animation: blink 0.8s infinite; }
    .dot.done { background: #7fff7f; }
    .dot.error { background: #ff6b6b; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
    #statusText { font-size: 11px; color: var(--text-muted); }

    /* ===== VIEWER ===== */
    .viewer {
      flex: 1; overflow-y: auto; overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      background: var(--bg);
    }

    /* ===== EMPTY STATE ===== */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100%; gap: 20px; padding: 40px 24px;
      text-align: center;
    }
    .empty-icon {
      width: 72px; height: 72px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex; align-items: center; justify-content: center;
      font-size: 30px;
    }
    .empty-title { font-size: 17px; font-weight: 500; color: var(--text); }
    .empty-desc { font-size: 13px; color: var(--text-muted); line-height: 1.7; max-width: 280px; }

    /* Upload */
    .upload-wrap { width: 100%; max-width: 320px; }
    .upload-area {
      border: 1.5px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 20px; text-align: center;
      cursor: pointer; transition: all 0.2s;
    }
    .upload-area:active { border-color: var(--accent); background: var(--accent-dim); }
    .upload-label { font-size: 13px; color: var(--text-muted); cursor: pointer; }
    .upload-label strong { color: var(--accent); display: block; margin-bottom: 4px; }
    #fileInput { display: none; }

    /* ===== IMAGE SECTION ===== */
    #imageSection { display: none; }
    .img-wrapper { position: relative; display: block; width: 100%; }
    .manga-img { width: 100%; display: block; }

    /* Bubble */
    .bubble {
      position: absolute;
      background: rgba(255,255,255,0.93);
      color: #111;
      border-radius: 10px;
      padding: 3px 6px;
      font-size: 11px;
      font-weight: 500;
      line-height: 1.45;
      text-align: center;
      word-break: break-all;
      border: 1px solid rgba(0,0,0,0.12);
      box-shadow: 0 1px 6px rgba(0,0,0,0.25);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      font-family: 'Noto Sans JP', sans-serif;
    }
    .bubble:active { transform: scale(0.96); }

    /* Trans panel */
    .trans-panel {
      margin: 12px 16px 20px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      overflow: hidden;
      display: none;
    }
    .trans-panel.visible { display: block; }
    .trans-head {
      padding: 8px 14px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 10px; font-weight: 500;
      color: var(--accent); letter-spacing: 1.5px;
      text-transform: uppercase;
      font-family: 'DM Mono', monospace;
    }
    .trans-item { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .trans-item:last-child { border-bottom: none; }
    .trans-en { font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; margin-bottom: 3px; }
    .trans-ja { font-size: 14px; color: var(--text); line-height: 1.5; }

    /* ===== MODAL ===== */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: flex; align-items: flex-end; z-index: 100;
      opacity: 0; pointer-events: none; transition: opacity 0.2s;
    }
    .overlay.open { opacity: 1; pointer-events: auto; }
    .sheet {
      width: 100%; background: var(--surface);
      border-radius: 20px 20px 0 0;
      padding: 20px 20px calc(20px + var(--safe-bottom));
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32,1.2,0.64,1);
    }
    .overlay.open .sheet { transform: translateY(0); }
    .sheet-title { font-size: 15px; font-weight: 700; color: var(--accent); margin-bottom: 18px; font-family: 'DM Mono', monospace; }

    .field-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .field-desc { font-size: 11px; color: var(--text-dim); margin-bottom: 8px; }
    .field-input {
      width: 100%; background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px;
      font-size: 13px; color: var(--text); outline: none;
      font-family: 'DM Mono', monospace; margin-bottom: 14px;
    }
    .field-input:focus { border-color: var(--accent); }

    .field-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .field-row select {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 7px 10px;
      color: var(--text); font-size: 13px;
    }

    .btn-save {
      width: 100%; padding: 13px;
      background: var(--accent); color: #000; font-weight: 700;
      border: none; border-radius: var(--radius-md); font-size: 15px;
      cursor: pointer; font-family: 'Noto Sans JP', sans-serif; margin-top: 4px;
    }
    .btn-close {
      width: 100%; padding: 11px; margin-top: 8px;
      background: transparent; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: var(--radius-md);
      font-size: 14px; cursor: pointer;
      font-family: 'Noto Sans JP', sans-serif;
    }

    /* How-to link */
    .howto-link {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 11px; color: var(--accent);
      text-decoration: none; margin-top: 2px;
    }

    /* ===== TOAST ===== */
    .toast {
      position: fixed; bottom: calc(24px + var(--safe-bottom));
      left: 50%; transform: translateX(-50%) translateY(12px);
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text); font-size: 12px;
      padding: 9px 18px; border-radius: 20px;
      opacity: 0; pointer-events: none; z-index: 200;
      white-space: nowrap; transition: all 0.18s;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .bottom-pad { height: var(--safe-bottom); flex-shrink: 0; }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Manga<em>TL</em></div>
    <div class="header-spacer"></div>
    <div class="icon-btn" onclick="openSettings()" title="設定">⚙</div>
  </div>

  <!-- URL BAR -->
  <div class="url-bar">
    <div class="url-row">
      <input class="url-input" id="urlInput" type="url" placeholder="https://... 漫画画像のURLを貼り付け" />
      <button class="go-btn" id="goBtn" onclick="loadFromUrl()">翻訳</button>
    </div>
  </div>

  <!-- NAV BAR -->
  <div class="nav-bar" id="navBar">
    <button class="nav-btn" id="prevBtn" onclick="goPage(-1)" disabled>← 前へ</button>
    <span class="page-label" id="pageLabel"></span>
    <button class="nav-btn" id="nextBtn" onclick="goPage(1)" disabled>次へ →</button>
    <button class="nav-btn" id="retransBtn" onclick="retranslate()">再翻訳</button>
  </div>

  <!-- STATUS -->
  <div class="status-bar">
    <div class="dot" id="dot"></div>
    <span id="statusText">URLを入力して翻訳を開始してください</span>
  </div>

  <!-- VIEWER -->
  <div class="viewer" id="viewer">

    <!-- Empty state -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">📖</div>
      <div class="empty-title">MangaTL</div>
      <div class="empty-desc">英語漫画のURLを入力するか、<br>画像をアップロードして翻訳を開始。<br>Google Geminiで完全無料！</div>
      <div class="upload-wrap">
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
          <label class="upload-label">
            <strong>画像をアップロード</strong>
            jpg / png / webp 対応
          </label>
          <input type="file" id="fileInput" accept="image/*" onchange="loadFromFile(event)" />
        </div>
      </div>
    </div>

    <!-- Image section -->
    <div id="imageSection">
      <div class="img-wrapper" id="imgWrapper">
        <img class="manga-img" id="mangaImg" alt="漫画" />
      </div>
      <div class="trans-panel" id="transPanel">
        <div class="trans-head">翻訳一覧</div>
        <div id="transList"></div>
      </div>
    </div>

  </div>

  <div class="bottom-pad"></div>
</div>

<!-- SETTINGS MODAL -->
<div class="overlay" id="overlay" onclick="outsideClose(event)">
  <div class="sheet">
    <div class="sheet-title">// 設定</div>

    <div class="field-label">Gemini API キー <span style="color:var(--accent);font-size:10px;">★ 無料</span></div>
    <div class="field-desc">Google AI Studio で無料取得できます →
      <a class="howto-link" href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com ↗</a>
    </div>
    <input class="field-input" id="apiKeyInput" type="password" placeholder="AIza..." />

    <div class="field-row">
      <div>
        <div class="field-label" style="margin-bottom:0;">吹き出し文字サイズ</div>
      </div>
      <select id="fontSizeSelect">
        <option value="10">小（10px）</option>
        <option value="12" selected>中（12px）</option>
        <option value="14">大（14px）</option>
      </select>
    </div>

    <div class="field-row">
      <div>
        <div class="field-label" style="margin-bottom:0;">吹き出し背景</div>
      </div>
      <select id="bubbleBgSelect">
        <option value="rgba(255,255,255,0.93)">白（デフォルト）</option>
        <option value="rgba(255,255,180,0.93)">薄黄色</option>
        <option value="rgba(180,230,255,0.93)">薄青色</option>
      </select>
    </div>

    <button class="btn-save" onclick="saveSettings()">保存</button>
    <button class="btn-close" onclick="closeSettings()">閉じる</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
let apiKey = localStorage.getItem('gemini_key') || '';
let fontSize = localStorage.getItem('fontSize') || '12';
let bubbleBg = localStorage.getItem('bubbleBg') || 'rgba(255,255,255,0.93)';
let history = [];
let currentIdx = -1;
let isLoading = false;
let currentB64 = null;
let currentMime = 'image/jpeg';

const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent';

// ===== UI HELPERS =====
function setStatus(msg, type = 'idle') {
  document.getElementById('statusText').textContent = msg;
  const d = document.getElementById('dot');
  d.className = 'dot' + (type === 'loading' ? ' loading' : type === 'done' ? ' done' : type === 'error' ? ' error' : '');
}

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function setLoading(v) {
  isLoading = v;
  document.getElementById('goBtn').disabled = v;
  document.getElementById('retransBtn').disabled = v;
}

// ===== SETTINGS =====
function openSettings() {
  document.getElementById('apiKeyInput').value = apiKey;
  document.getElementById('fontSizeSelect').value = fontSize;
  document.getElementById('bubbleBgSelect').value = bubbleBg;
  document.getElementById('overlay').classList.add('open');
}
function closeSettings() { document.getElementById('overlay').classList.remove('open'); }
function outsideClose(e) { if (e.target === document.getElementById('overlay')) closeSettings(); }
function saveSettings() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  fontSize = document.getElementById('fontSizeSelect').value;
  bubbleBg = document.getElementById('bubbleBgSelect').value;
  localStorage.setItem('gemini_key', apiKey);
  localStorage.setItem('fontSize', fontSize);
  localStorage.setItem('bubbleBg', bubbleBg);
  closeSettings();
  toast('設定を保存しました');
}

// ===== LOAD FROM URL =====
function loadFromUrl() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { setStatus('URLを入力してください', 'error'); return; }
  if (!apiKey) { openSettings(); toast('先にAPIキーを設定してください'); return; }
  setStatus('画像を読み込み中...', 'loading');
  setLoading(true);

  const img = new Image();
  img.crossOrigin = 'Anonymous';
  img.onload = () => {
    const canvas = document.createElement('canvas');
    canvas.width = img.naturalWidth;
    canvas.height = img.naturalHeight;
    canvas.getContext('2d').drawImage(img, 0, 0);
    try {
      currentB64 = canvas.toDataURL('image/jpeg').split(',')[1];
      currentMime = 'image/jpeg';
      addHistory(url);
      displayAndTranslate(img.src);
    } catch(e) {
      setStatus('CORS制限で読込不可。画像を保存してアップロードしてください', 'error');
      setLoading(false);
    }
  };
  img.onerror = () => { setStatus('画像の読み込みに失敗しました', 'error'); setLoading(false); };
  img.src = url;
}

// ===== LOAD FROM FILE =====
function loadFromFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (!apiKey) { openSettings(); toast('先にAPIキーを設定してください'); return; }
  setStatus('画像を読み込み中...', 'loading');
  setLoading(true);
  const reader = new FileReader();
  reader.onload = e => {
    currentMime = file.type || 'image/jpeg';
    currentB64 = e.target.result.split(',')[1];
    displayAndTranslate(e.target.result);
  };
  reader.readAsDataURL(file);
}

// ===== DISPLAY IMAGE =====
function displayAndTranslate(src) {
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('imageSection').style.display = 'block';
  document.getElementById('navBar').classList.add('visible');
  clearBubbles();
  document.getElementById('transPanel').classList.remove('visible');
  document.getElementById('transList').innerHTML = '';

  const img = document.getElementById('mangaImg');
  img.src = src;
  img.onload = () => translateImage();
}

// ===== HISTORY =====
function addHistory(url) {
  if (history[currentIdx] === url) return;
  history = history.slice(0, currentIdx + 1);
  history.push(url);
  currentIdx = history.length - 1;
  updateNav();
}

function goPage(dir) {
  const next = currentIdx + dir;
  if (next < 0 || next >= history.length) return;
  currentIdx = next;
  const url = history[currentIdx];
  document.getElementById('urlInput').value = url;
  setLoading(true);
  setStatus('画像を読み込み中...', 'loading');
  const img2 = new Image();
  img2.crossOrigin = 'Anonymous';
  img2.onload = () => {
    const c = document.createElement('canvas');
    c.width = img2.naturalWidth; c.height = img2.naturalHeight;
    c.getContext('2d').drawImage(img2, 0, 0);
    currentB64 = c.toDataURL('image/jpeg').split(',')[1];
    currentMime = 'image/jpeg';
    displayAndTranslate(img2.src);
  };
  img2.onerror = () => { setStatus('読込失敗', 'error'); setLoading(false); };
  img2.src = url;
  updateNav();
}

function updateNav() {
  document.getElementById('prevBtn').disabled = currentIdx <= 0;
  document.getElementById('nextBtn').disabled = currentIdx >= history.length - 1;
  document.getElementById('pageLabel').textContent =
    history.length > 0 ? `${currentIdx + 1} / ${history.length}` : '';
}

function retranslate() {
  if (!currentB64) return;
  clearBubbles();
  document.getElementById('transPanel').classList.remove('visible');
  document.getElementById('transList').innerHTML = '';
  translateImage();
}

function clearBubbles() {
  document.getElementById('imgWrapper').querySelectorAll('.bubble').forEach(b => b.remove());
}

// ===== TRANSLATE WITH GEMINI =====
async function translateImage() {
  if (isLoading && !currentB64) return;
  setLoading(true);
  setStatus('Gemini AIが吹き出しを検出・翻訳中...', 'loading');

  const prompt = `あなたは漫画翻訳の専門家です。この漫画画像を詳しく分析して、吹き出し内のすべての英語テキストを検出し、自然な日本語に翻訳してください。

必ず以下のJSON形式のみで返答してください（説明文・マークダウン記号・\`\`\`は一切不要）:
{"bubbles":[{"id":1,"english":"原文英語テキスト","japanese":"日本語翻訳","position":{"top_percent":数値,"left_percent":数値,"width_percent":数値}}]}

位置の説明:
- top_percent: 吹き出し上端（画像全体の高さに対する%、0〜95）
- left_percent: 吹き出し左端（画像全体の幅に対する%、0〜90）
- width_percent: 吹き出し幅（画像全体の幅に対する%、8〜45）

吹き出しが1つも見つからない場合のみ: {"bubbles":[]}`;

  try {
    const res = await fetch(`${GEMINI_URL}?key=${apiKey}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{
          parts: [
            { inline_data: { mime_type: currentMime, data: currentB64 } },
            { text: prompt }
          ]
        }],
        generationConfig: { temperature: 0.1, maxOutputTokens: 2048 }
      })
    });

    const data = await res.json();

    if (data.error) throw new Error(data.error.message || 'Gemini APIエラー');

    const raw = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
    const clean = raw.replace(/```json|```/g, '').trim();

    let parsed;
    try {
      parsed = JSON.parse(clean);
    } catch(e) {
      // JSONが一部しか取れない場合も試みる
      const match = clean.match(/\{[\s\S]*\}/);
      if (match) parsed = JSON.parse(match[0]);
      else throw new Error('レスポンスの解析に失敗しました');
    }

    renderBubbles(parsed.bubbles || []);

  } catch(err) {
    setStatus('エラー: ' + err.message, 'error');
    console.error(err);
  }

  setLoading(false);
}

// ===== RENDER BUBBLES =====
function renderBubbles(bubbles) {
  clearBubbles();
  const wrapper = document.getElementById('imgWrapper');
  const list = document.getElementById('transList');
  list.innerHTML = '';

  if (bubbles.length === 0) {
    setStatus('吹き出しが検出されませんでした', 'done');
    return;
  }

  bubbles.forEach((b, i) => {
    // Overlay bubble
    const div = document.createElement('div');
    div.className = 'bubble';
    div.style.top = b.position.top_percent + '%';
    div.style.left = b.position.left_percent + '%';
    div.style.width = b.position.width_percent + '%';
    div.style.fontSize = fontSize + 'px';
    div.style.background = bubbleBg;
    div.textContent = b.japanese;
    div.title = '原文: ' + b.english;
    div.onclick = () => {
      navigator.clipboard.writeText(b.japanese).catch(() => {});
      toast('コピーしました');
    };
    wrapper.appendChild(div);

    // List item
    const item = document.createElement('div');
    item.className = 'trans-item';
    item.innerHTML = `<div class="trans-en">${i + 1}. ${esc(b.english)}</div><div class="trans-ja">${esc(b.japanese)}</div>`;
    list.appendChild(item);
  });

  document.getElementById('transPanel').classList.add('visible');
  setStatus(`${bubbles.length}個の吹き出しを翻訳しました ✓`, 'done');
}

function esc(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ===== EVENTS =====
document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') loadFromUrl();
});

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// Init: prompt for API key
if (!apiKey) {
  setTimeout(openSettings, 600);
}
</script>
